spring:
  application:
    name: payment-service
  config:
    import: "optional:configserver:http://localhost:8888"
  kafka:
    bootstrap-servers: localhost:9092
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
    consumer:
      group-id: ${spring.application.name}
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      auto-offset-reset: earliest
    properties:
      spring.json.trusted.packages: "com.microservices.pro.*"
      spring.json.type.mapping: "orderPlaced:com.microservices.pro.payment.events.OrderPlacedEvent,inventoryReserved:com.microservices.pro.payment.events.InventoryReservedEvent,inventoryReservationFailed:com.microservices.pro.payment.events.InventoryReservationFailedEvent,paymentCompleted:com.microservices.pro.payment.events.PaymentCompletedEvent,paymentFailed:com.microservices.pro.payment.events.PaymentFailedEvent,inventoryReleased:com.microservices.pro.payment.events.InventoryReleasedEvent,orderConfirmed:com.microservices.pro.payment.events.OrderConfirmedEvent,orderCancelled:com.microservices.pro.payment.events.OrderCancelledEvent"

server:
  port: 8083

payment:
  failure-rate: 50 # percentage chance (0-100) of a simulated payment failure
  delay-ms: 0 # set to 3000 (3s) to trigger the 2s TimeLimiter on Order Service.

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
  instance:
    prefer-ip-address: true

management:
  endpoints:
    web:
      exposure:
        include: health,info